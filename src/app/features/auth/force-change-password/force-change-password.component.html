<div class="auth-layout" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: url('assets/images/auth-bg.jpg') center/cover no-repeat; position: relative;">
  <div class="overlay" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px);"></div>
  
  <div class="auth-container" style="position: relative; z-index: 10; width: 100%; max-width: 480px; padding: 2rem;">
    <div class="glass-card" style="background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
      
      <div class="header-text" style="text-align: center; margin-bottom: 2rem;">
        <h2 style="font-size: 1.75rem; font-weight: 700; color: #f8fafc; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
          <svg style="width: 28px; height: 28px; color: #10b981;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          Seguridad de la Cuenta
        </h2>
        <p style="color: #94a3b8; font-size: 0.95rem;">Por políticas de privacidad, debes crear una nueva contraseña confidencial para poder continuar.</p>
      </div>

      <div class="alert error" *ngIf="errorMessage" style="background: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; color: #fca5a5;">
        {{ errorMessage }}
      </div>
      
      <div class="alert success" *ngIf="successMessage" style="background: rgba(16, 185, 129, 0.1); border-left: 4px solid #10b981; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; color: #6ee7b7;">
        {{ successMessage }}
      </div>

      <form (ngSubmit)="onChangePassword()" *ngIf="!successMessage">
        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #cbd5e1; margin-bottom: 0.5rem;">Nueva Contraseña</label>
          <input type="password" [(ngModel)]="newPassword" name="newPassword" required style="width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 0.875rem 1rem; color: white; outline: none; transition: all 0.2s;" placeholder="Mínimo 6 caracteres">
        </div>

        <div class="form-group" style="margin-bottom: 2rem;">
          <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #cbd5e1; margin-bottom: 0.5rem;">Confirmar Contraseña</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required style="width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 0.875rem 1rem; color: white; outline: none; transition: all 0.2s;" placeholder="Repite tu contraseña">
        </div>

        <button type="submit" [disabled]="isSubmitting" style="width: 100%; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border: none; border-radius: 12px; padding: 1rem; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.39);">
          {{ isSubmitting ? 'Actualizando...' : 'Guardar y Continuar' }}
        </button>
      </form>
    </div>
  </div>
</div>
