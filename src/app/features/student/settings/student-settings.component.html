<div class="settings-container">
  <div class="header-row">
    <h2><mat-icon>settings</mat-icon> Configuración de Perfil</h2>
    <p>Ajusta tus datos académicos y personales.</p>
  </div>

  <div class="settings-grid">
    
    <div class="avatar-wrapper" style="margin-bottom: 2rem; width: 100%; max-width: 100%; box-sizing: border-box;">
      <app-profile-avatar></app-profile-avatar>
    </div>

    <div class="card settings-card">
      <div class="card-header">
        <h3><mat-icon>school</mat-icon> Datos Académicos</h3>
        <p>Tu facultad determina qué especialistas tienes disponibles para agendar citas.</p>
      </div>
      
      <div class="card-body">
        <div class="form-group">
          <label>Facultad a la que perteneces</label>
          <select [(ngModel)]="selectedFaculty" class="styled-select">
            <option value="" disabled>Selecciona tu facultad</option>
            <option *ngFor="let f of faculties" [value]="f.name">{{ f.name }}</option>
          </select>
        </div>

        <div class="actions">
          <button mat-flat-button color="primary" (click)="confirmSave()" [disabled]="isSaving || !selectedFaculty" class="btn-primary">
            <mat-icon style="margin-right: 8px;">save</mat-icon> Guardar Cambios
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
